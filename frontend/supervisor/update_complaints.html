<!DOCTYPE html>
<html>

<head>
    <title>Update Complaint</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <script src="../static/js/main.js"></script>
</head>

<body>

    <div class="app">

        <div class="sidebar">
            <h2>HostelHub</h2>
            <p style="color:#777;font-size:14px;">Supervisor Portal</p>
            <ul>
                <li onclick="location.href='dashboard.html'">Dashboard</li>
                <li class="active">Assigned Tasks</li>
                <li onclick="location.href='workers.html'">Manage Workers</li>
                <li onclick="location.href='notices.html'">Notices</li>
                <li onclick="location.href='reports.html'">Reports</li>
            </ul>
            <div class="sidebar-logout" onclick="logout()">
                Logout
            </div>
        </div>

        <div class="content">

            <h2>Update Complaint</h2>

            <div class="card">

                <label>Assign Worker</label>
                <select name="worker">
                    <option>Ramesh (Plumber)</option>
                    <option>Vijay (Electrician)</option>
                    <option>Suresh (Carpenter)</option>
                </select>

                <label>Status</label>
                <select name="status">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Resolved">Resolved</option>
                </select>


                <label>Work Completion Remarks</label>
                <textarea placeholder="Describe the work done"></textarea>

                <label>Upload Proof (Image)</label>
                <input type="file" accept="image/*" onchange="previewImage(event)">

                <img id="preview" style="
    display:none;
    margin-top:12px;
    max-width:200px;
    border-radius:8px;
    border:1px solid #ddd;
">


                <button class="btn" onclick="updateComplaint()">Update Complaint</button>



            </div>

        </div>
    </div>




    <script>
        function previewImage(event) {
            const img = document.getElementById("preview");
            const file = event.target.files[0];

            if (!file) {
                img.style.display = "none";
                return;
            }

            img.src = URL.createObjectURL(file);
            img.style.display = "block";
        }
    </script>
    <script>
        function updateComplaint() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");

            if (!id) {
                alert("Complaint ID missing");
                return;
            }

            const status = document.querySelector("select[name='status']").value;
            const worker = document.querySelector("select[name='worker']").value.split(" ")[0];

            // Load workers data
            let workers = JSON.parse(localStorage.getItem("workers")) || {};

            // Get previous values
            const prevStatus = localStorage.getItem(id + "_status");
            const prevWorker = localStorage.getItem(id + "_worker");

            /* -------------------------------
               HANDLE WORKER COUNT CHANGES
            --------------------------------*/

            // 1️⃣ If worker changed
            if (prevWorker && prevWorker !== worker) {
                if (workers[prevWorker] > 0) workers[prevWorker]--;
                workers[worker] = (workers[worker] || 0) + 1;
            }

            // 2️⃣ First time assignment
            if (!prevWorker) {
                workers[worker] = (workers[worker] || 0) + 1;
            }

            // 3️⃣ Status change handling
            if (prevStatus !== status) {
                // Going to Resolved → decrement
                if (status === "Resolved") {
                    if (workers[worker] > 0) workers[worker]--;
                }

                // Coming back from Resolved → increment
                if (prevStatus === "Resolved" && status !== "Resolved") {
                    workers[worker] = (workers[worker] || 0) + 1;
                }
            }

            // Save updated data
            localStorage.setItem("workers", JSON.stringify(workers));
            localStorage.setItem(id + "_status", status);
            localStorage.setItem(id + "_worker", worker);

            alert("Complaint updated successfully!");
            window.location.href = "complaints.html";
        }
    </script>

</body>

</html>
