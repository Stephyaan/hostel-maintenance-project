<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Notices | HostelHub</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/main.js"></script>
    <style>
        .notice {
            padding: 16px;
            border-left: 6px solid;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .info {
            background: #e7f3ff;
            border-color: #2b7cff;
        }

        .warning {
            background: #fff4e5;
            border-color: #f0ad4e;
        }

        .success {
            background: #e6f4ea;
            border-color: #28a745;
        }

        .danger {
            background: #fdecea;
            border-color: #dc3545;
        }
    </style>
</head>

<body>

    <div class="app student-app">

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>HostelHub</h2>
            <p class="portal-label">Student Portal</p>

            <ul>
                <li onclick="location.href='/student/dashboard.html'">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    Dashboard
                </li>
                <li onclick="location.href='/student/complaints.html'">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    My Complaints
                </li>
                <li onclick="location.href='/student/request_resources.html'">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2"/><path d="M21 12v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6"/><path d="M12 12h.01"/></svg>
                    Request Resources
                </li>
                <li class="active" onclick="location.href='/student/notices.html'">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    Notices
                </li>
                <li onclick="location.href='/student/emergency.html'">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Emergency
                </li>
            </ul>
            <div class="sidebar-logout" onclick="logout()">
                Logout
            </div>
        </div>



        <!-- Content -->
        <div class="content">

            <!-- Advanced Top Header -->
            <div class="advanced-top">
                <div id="welcomeArea">
                    <h2 id="pageTitle">Hostel Announcements</h2>
                    <p id="pageSub">Stay updated with the latest news, maintenance schedules, and events.</p>
                </div>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <button class="btn" onclick="location.reload()" style="padding: 10px 20px; font-size: 14px; display: flex; align-items: center; gap: 8px;">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                        Refresh
                    </button>
                </div>
            </div>

            <div id="noticesList">
                <p style="text-align:center; padding: 40px; color: #94a3b8;">Loading notices...</p>
            </div>

        </div>
    </div>
    <script>
        window.onload = async function () {
            syncSidebarSettings();

            const notices = await apiCall('notices/', 'GET');
            const container = document.getElementById('noticesList');

            if (notices && notices.length > 0) {
                container.innerHTML = notices.map(n => {
                    const category = n.category?.toLowerCase() || 'info';
                    const dateStr = new Date(n.created_at).toLocaleDateString();
                    return `
                        <div class="notice ${category}">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                <b>${n.title}</b>
                                <small style="color:#64748b;">${dateStr}</small>
                            </div>
                            <p style="margin: 8px 0 0 0; font-size:14px; color:#334155;">${n.content}</p>
                        </div>
                    `;
                }).join('');
            } else {
                container.innerHTML = '<p style="text-align:center; padding: 40px; color: #94a3b8; font-style:italic;">No active notices at this time.</p>';
            }
        }
    </script>
</body>

</html>
