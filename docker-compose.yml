version: '3.8'

services:
  backend:
    build: ./backend
    container_name: hostel_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build: ./frontend
    container_name: hostel_frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
